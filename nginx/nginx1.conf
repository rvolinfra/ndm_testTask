#
# nginx1 - точка входа на :8081
#
# Логика построения X-Forwarded-For:
#   1. geo $is_trusted_proxy - whitelist IP соседних nginx (фиксированы в docker-compose).
#      Источник запроса с любым другим адресом (в т.ч. docker-gateway 10.10.0.1,
#      под которым выглядит curl с хоста) считается внешним клиентом.
#   2. map $is_trusted_proxy $xff_value:
#        - trusted=1  ->  "$http_x_forwarded_for, $remote_addr"  (наращиваем цепочку);
#        - trusted=0  ->  "$remote_addr"  (XFF от клиента полностью отбрасывается).
#   3. В proxy_set_header X-Forwarded-For передаётся ИМЕННО $xff_value, а не дефолтный
#      $proxy_add_x_forwarded_for - иначе forged-заголовок клиента просочился бы в цепочку.
#

user  nginx;
worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    log_format xff '[$time_local] node=nginx1 src=$remote_addr trusted=$is_trusted_proxy '
                   'method=$request_method uri=$request_uri '
                   'xff_in="$http_x_forwarded_for" xff_out="$xff_value" '
                   'upstream=$upstream_addr status=$status';
    access_log /var/log/nginx/access.log xff;
    error_log  /var/log/nginx/error.log warn;

    sendfile on;
    keepalive_timeout 65;
    server_tokens off;

    # Доверяем только зафиксированным адресам других nginx в сети proxynet.
    geo $is_trusted_proxy {
        default        0;
        10.10.0.12/32  1;   # nginx2
        10.10.0.13/32  1;   # nginx3
    }

    # Финальное значение X-Forwarded-For для upstream-а.
    map $is_trusted_proxy $xff_value {
        0  $remote_addr;
        1  "$http_x_forwarded_for, $remote_addr";
    }

    upstream app    { server app:8000;    keepalive 16; }
    upstream nginx2 { server nginx2:80;   keepalive 16; }
    upstream nginx3 { server nginx3:80;   keepalive 16; }

    server {
        listen 80 default_server;
        server_name _;

        # Базовые таймауты, разумные для тестового стенда.
        proxy_connect_timeout 5s;
        proxy_send_timeout    10s;
        proxy_read_timeout    10s;

        # /  -> приложение напрямую
        location = / {
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header Connection        "";
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $xff_value;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://app;
        }

        # /via/2/...  -> следующий хоп: nginx2
        location /via/2/ {
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header Connection        "";
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $xff_value;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://nginx2/;
        }

        # /via/3/...  -> следующий хоп: nginx3
        location /via/3/ {
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header Connection        "";
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $xff_value;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://nginx3/;
        }

        # Fallback для произвольного path -> в приложение (см. echo).
        location / {
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header Connection        "";
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $xff_value;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://app;
        }
    }
}
