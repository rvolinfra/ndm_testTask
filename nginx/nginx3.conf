#
# nginx3 - точка входа на :8083. См. nginx1.conf, логика идентична.
#

user  nginx;
worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    log_format xff '[$time_local] node=nginx3 src=$remote_addr trusted=$is_trusted_proxy '
                   'method=$request_method uri=$request_uri '
                   'xff_in="$http_x_forwarded_for" xff_out="$xff_value" '
                   'upstream=$upstream_addr status=$status';
    access_log /var/log/nginx/access.log xff;
    error_log  /var/log/nginx/error.log warn;

    sendfile on;
    keepalive_timeout 65;
    server_tokens off;

    geo $is_trusted_proxy {
        default        0;
        10.10.0.11/32  1;   # nginx1
        10.10.0.12/32  1;   # nginx2
    }

    map $is_trusted_proxy $xff_value {
        0  $remote_addr;
        1  "$http_x_forwarded_for, $remote_addr";
    }

    upstream app    { server app:8000;  keepalive 16; }
    upstream nginx1 { server nginx1:80; keepalive 16; }
    upstream nginx2 { server nginx2:80; keepalive 16; }

    server {
        listen 80 default_server;
        server_name _;

        proxy_connect_timeout 5s;
        proxy_send_timeout    10s;
        proxy_read_timeout    10s;

        location = / {
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header Connection        "";
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $xff_value;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://app;
        }

        location /via/1/ {
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header Connection        "";
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $xff_value;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://nginx1/;
        }

        location /via/2/ {
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header Connection        "";
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $xff_value;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://nginx2/;
        }

        location / {
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header Connection        "";
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $xff_value;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://app;
        }
    }
}
